<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT BRNDS™ — Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
  :root{ --red:#D81C1C; --red-dark:#A91414; --bone:#F0EDE6; --ink:#0A0A0A; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter',sans-serif;
    background:var(--ink); color:var(--bone);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    width:100%; max-width:440px;
    border:1px solid rgba(255,255,255,0.07);
    padding:48px 40px 44px;
    background:#101010;
    position:relative;
    overflow:hidden;
  }
  /* Red corner accent — matches the site's Abloh language */
  .card::before{
    content:"";
    position:absolute; top:0; left:0;
    width:0; height:0;
    border-style:solid;
    border-width:56px 56px 0 0;
    border-color:var(--red) transparent transparent transparent;
  }
  .brand{
    font-family:'Anton',sans-serif; font-size:15px;
    color:var(--red); letter-spacing:.08em;
    margin-bottom:36px;
  }
  /* Big code number behind content */
  .bg-num{
    font-family:'Anton',sans-serif;
    font-size:200px; line-height:1;
    color:#fff; opacity:.025;
    position:absolute; bottom:-20px; right:-10px;
    pointer-events:none; user-select:none;
    letter-spacing:-.02em;
  }
  .headline{
    font-family:'Anton',sans-serif;
    font-size:clamp(32px, 8vw, 48px);
    line-height:.92; letter-spacing:.01em;
    color:#fff;
    margin-bottom:8px;
  }
  .headline em{ color:var(--red); font-style:normal; }
  .divider{
    width:48px; height:2px;
    background:var(--red);
    margin:20px 0 22px;
  }
  .body-text{
    font-size:13px; line-height:1.75;
    color:rgba(240,237,230,0.7);
    margin-bottom:28px;
  }
  .body-text strong{
    color:#fff;
    font-weight:900;
    font-size:14px;
    display:block;
    margin-bottom:6px;
    letter-spacing:.01em;
  }
  .season-line{
    font-family:'Anton',sans-serif;
    font-size:18px;
    letter-spacing:.06em;
    color:var(--red);
    margin-bottom:28px;
    text-transform:uppercase;
  }
  .contact-block{
    border-top:1px solid rgba(255,255,255,0.07);
    padding-top:22px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .contact-label{
    font-size:9px; font-weight:900;
    letter-spacing:.18em; text-transform:uppercase;
    color:#555; margin-bottom:4px;
  }
  .contact-link{
    display:flex; align-items:center; gap:10px;
    text-decoration:none;
    color:var(--bone);
    font-size:13px; font-weight:700;
    padding:12px 14px;
    border:1px solid rgba(255,255,255,0.07);
    transition:border-color 200ms, color 200ms, background 200ms;
  }
  .contact-link:hover{
    border-color:var(--red);
    background:rgba(216,28,28,0.06);
    color:#fff;
  }
  .contact-link svg{ flex-shrink:0; }
  .foot{
    margin-top:28px;
    font-size:9px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase;
    color:#333;
    text-align:center;
  }
</style>
</head>
