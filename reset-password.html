<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT BRNDS™ — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<style>
  :root{ --red:#D81C1C; --red-dark:#A91414; --bone:#F0EDE6; --ink:#0A0A0A; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'Inter',sans-serif;
    background:var(--ink); color:var(--bone);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    width:100%; max-width:400px;
    border:1px solid rgba(255,255,255,0.07);
    padding:44px 40px 40px;
    background:#101010;
  }
  .brand{
    font-family:'Anton',sans-serif; font-size:16px;
    color:var(--red); letter-spacing:.06em; margin-bottom:32px;
  }
  .headline{
    font-family:'Anton',sans-serif; font-size:44px;
    line-height:.92; letter-spacing:.01em; color:var(--bone);
    margin-bottom:6px;
  }
  .headline em{ color:var(--red); font-style:normal; }
  .sub{
    font-size:9px; font-weight:700; letter-spacing:.16em;
    text-transform:uppercase; color:#555; margin-bottom:28px;
    display:flex; align-items:center; gap:10px;
  }
  .sub::after{ content:""; flex:1; height:1px; background:rgba(255,255,255,0.06); }
  .field{ margin-bottom:20px; }
  label{
    display:block; font-size:9px; font-weight:900;
    letter-spacing:.16em; text-transform:uppercase; color:#555;
    margin-bottom:8px;
  }
  label::before{ content:"→ "; color:var(--red); }
  input{
    width:100%; background:transparent; border:none;
    border-bottom:1px solid #2e2e2e;
    padding:9px 0; font-size:14px; color:var(--bone);
    font-family:'Inter',sans-serif; outline:none;
    transition:border-color 200ms;
  }
  input:focus{ border-bottom-color:var(--red); }
  input::placeholder{ color:#555; }
  input:disabled{ opacity:.5; }
  .btn{
    width:100%; padding:15px; background:var(--red); color:#fff;
    border:none; font-family:'Anton',sans-serif; font-size:13px;
    letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
    transition:background 200ms; margin-top:4px;
  }
  .btn:hover{ background:var(--red-dark); }
  .btn:disabled{ opacity:.55; cursor:not-allowed; }
  .msg{
    padding:10px 14px; font-size:11px; font-weight:700;
    letter-spacing:.08em; text-transform:uppercase; line-height:1.5;
    margin-bottom:16px;
  }
  .msg.error{   background:rgba(216,28,28,0.1);  border-left:2px solid var(--red);   color:var(--red); }
  .msg.success{ background:rgba(37,211,102,0.1); border-left:2px solid #25D366; color:#25D366; }
  .back{
    display:block; text-align:center; margin-top:20px;
    font-size:10px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:#555; text-decoration:none;
    transition:color 200ms;
  }
  .back:hover{ color:var(--bone); }
  .loading-msg{
    text-align:center; font-size:11px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; color:#555;
    padding:20px 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">HOT BRNDS™</div>
  <div id="content">
    <div class="loading-msg">Verifying reset link...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="reset-password.js"></script>
</body>
</html>
