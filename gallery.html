<!-- ── GALLERY HEADER ── -->
<header class="gal-header">
  <div class="gh-kicker">c/o HOT BRANDS™ — 2024</div>
  <h1 class="gh-title">GALLERY</h1>
  <p class="gh-sub">The campaign. The culture. The movement.</p>
  <div class="gh-rule"></div>
</header>

<!-- ── FILTER BAR ── -->
<div class="gal-filters">
  <button class="gf active" data-cat="all">All <span class="gf-count" id="countAll"></span></button>
  <button class="gf" data-cat="campaign">Campaign</button>
  <button class="gf" data-cat="lookbook">Lookbook</button>
  <!-- <button class="gf" data-cat="bts">Behind The Brand</button> -->
</div>

<!-- ── GRID ── -->
<div class="gal-grid" id="galGrid"></div>

<!-- ── EDITORIAL TEXT BREAK (injected between sections by JS) ── -->
<template id="tplBreak">
  <div class="gal-break">
    <span class="gb-num"></span>
    <span class="gb-text"></span>
    <div class="gb-line"></div>
  </div>
</template>

<!-- ── LIGHTBOX ── -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <div class="lb-media" id="lbMedia"></div>
  <div class="lb-info">
    <div class="lb-caption" id="lbCaption"></div>
    <div class="lb-sub" id="lbSub"></div>
  </div>
  <button class="lb-prev" id="lbPrev">←</button>
  <button class="lb-next" id="lbNext">→</button>
</div>
