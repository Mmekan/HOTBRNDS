<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOT BRNDS™ — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Anton&display=swap" rel="stylesheet">
<link rel="stylesheet" href="signup-v2.css">
<style>
  .auth-error{
    background:rgba(216,28,28,0.1);border-left:2px solid #D81C1C;
    padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.08em;
    color:#D81C1C;text-transform:uppercase;margin-bottom:16px;line-height:1.5;
  }
  .auth-success{
    background:rgba(37,211,102,0.1);border-left:2px solid #25D366;
    padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.08em;
    color:#25D366;text-transform:uppercase;margin-bottom:16px;line-height:1.5;
  }
  .cta:disabled{ opacity:.55; cursor:not-allowed; }
  .back-to-login{
    display:block;text-align:center;margin-top:14px;
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);text-decoration:none;cursor:pointer;background:none;border:none;
    width:100%;transition:color 200ms;
  }
  .back-to-login:hover{ color:var(--red,#D81C1C); }
</style>
</head>
<body>
<div id="app">
  <div :class="['page', isDark ? 'dk' : 'lt']">

    <!-- ═══════ LEFT — EDITORIAL CAROUSEL ═══════ -->
    <div class="carousel">
      <div v-for="(s, i) in slides" :key="i" :class="['slide', {on: slide===i}]">
        <video v-if="s.type==='video'" id="hb-video" :src="'https://pub-a217d12273d04376985a75209b836769.r2.dev/' + s.file" playsinline muted preload="metadata"></video>
        <img v-else :src="'https://pub-a217d12273d04376985a75209b836769.r2.dev/' + s.file" :alt="s.label" loading="lazy">
      </div>
      <div class="carousel-ui">
        <div class="slide-meta">
          <div class="slide-num">{{ slides[slide].num }}</div>
          <div class="slide-caption">{{ slides[slide].label }}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button v-for="(s,i) in slides" :key="i" :class="['dot',{on:slide===i}]"
            :style="slide===i?'width:40px':'width:20px'" @click="goTo(i)"></button>
          <button class="next-btn" @click="advance">→</button>
        </div>
      </div>
    </div>

    <!-- ═══════ RIGHT — AUTH PANEL ═══════ -->
    <div class="auth">
      <div class="ruler-edge"></div>
      <div class="auth-body">

        <div class="hb-head">
          <div class="hb-logo">HOT BRNDS™</div>
          <div class="hb-byline">Official Access, Est. 2024. HB™</div>
        </div>

        <!-- TABS — hidden on forgot mode -->
        <div class="tabs" v-if="mode !== 'forgot'">
          <button :class="['tab',{on:mode==='signup'}]" @click="mode='signup';error='';success=''">Register</button>
          <button :class="['tab',{on:mode==='login'}]"  @click="mode='login'; error='';success=''">Log In</button>
        </div>

        <!-- ── SIGN UP ── -->
        <template v-if="mode==='signup'">
          <div class="form-head">"GET<br><span class="accent">ON.</span>"</div>
          <div class="form-tagline">Join the community.</div>

          <div v-if="error"   class="auth-error">{{ error }}</div>
          <div v-if="success" class="auth-success">{{ success }}</div>

          <div class="row">
            <div class="field">
              <label class="lbl">First Name</label>
              <input class="inp" type="text" name="fname"
                autocomplete="given-name" placeholder="First"
                v-model="form.first" :disabled="loading">
            </div>
            <div class="field">
              <label class="lbl">Last Name</label>
              <input class="inp" type="text" name="lname"
                autocomplete="family-name" placeholder="Last"
                v-model="form.last" :disabled="loading">
            </div>
          </div>
          <div class="field">
            <label class="lbl">Email</label>
            <input class="inp" type="email" name="email"
              autocomplete="email" placeholder="you@email.com"
              v-model="form.email" :disabled="loading">
          </div>
          <div class="field">
            <label class="lbl">Password</label>
            <input class="inp" type="password" name="password"
              autocomplete="new-password" placeholder="Min. 8 characters"
              v-model="form.pw" :disabled="loading" @keyup.enter="submitForm">
          </div>

          <button class="cta" @click="submitForm" :disabled="loading">
            {{ loading ? 'Creating account...' : 'Create Account' }}
          </button>
        </template>

        <!-- ── LOG IN ── -->
        <template v-else-if="mode==='login'">
          <div class="form-head">"BACK<br><span class="accent">IN."</span></div>
          <div class="form-tagline">Welcome to the roster.</div>

          <div v-if="error"   class="auth-error">{{ error }}</div>
          <div v-if="success" class="auth-success">{{ success }}</div>

          <div class="field">
            <label class="lbl">Email</label>
            <input class="inp" type="email" name="email"
              autocomplete="email" placeholder="you@email.com"
              v-model="form.email" :disabled="loading">
          </div>
          <div class="field">
            <label class="lbl">Password</label>
            <input class="inp" type="password" name="password"
              autocomplete="current-password" placeholder="Your password"
              v-model="form.pw" :disabled="loading" @keyup.enter="submitForm">
          </div>

          <button class="cta" @click="submitForm" :disabled="loading">
            {{ loading ? 'Logging in...' : 'Log In' }}
          </button>

          <button class="back-to-login" style="margin-top:18px;"
            @click="mode='forgot'; error=''; success=''">
            Forgot password →
          </button>
        </template>

        <!-- ── FORGOT PASSWORD ── -->
        <template v-else-if="mode==='forgot'">
          <div class="form-head">"RESET<br><span class="accent">IT."</span></div>
          <div class="form-tagline">We'll send a link to your email.</div>

          <div v-if="error"   class="auth-error">{{ error }}</div>
          <div v-if="success" class="auth-success">{{ success }}</div>

          <div class="field" v-if="!success">
            <label class="lbl">Email</label>
            <input class="inp" type="email" name="email"
              autocomplete="email" placeholder="you@email.com"
              v-model="form.email" :disabled="loading" @keyup.enter="sendReset">
          </div>

          <button class="cta" @click="sendReset" :disabled="loading" v-if="!success">
            {{ loading ? 'Sending...' : 'Send Reset Link' }}
          </button>

          <button class="back-to-login" @click="mode='login'; error=''; success=''">
            ← Back to Log In
          </button>
        </template>

        <div class="auth-foot">
          <div class="foot-copy">© HB™ 2024<br>AUTHORIZED ACCESS ONLY</div>
          <div class="toggle" @click="toggleTheme">
            <span>{{ isDark ? 'DARK' : 'LIGHT' }}</span>
            <div class="trk"><div class="thm"></div></div>
          </div>
        </div>

      </div>
      <div class="stamp"><span>100%<br>AUTH-<br>ENTIC</span></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="cart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="signup-v2.js"></script>
</body>
</html>
